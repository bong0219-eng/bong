<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>순례길 지도 (카카오 기반 통합용)</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0&libraries=clusterer"></script>
<style>
/* =====================================================
   기존 앱 :root 변수 그대로 사용 가정
   ===================================================== */
:root {
  --brand: #8B1C2A;
  --brand-light: #c0424f;
  --brand-bg: #fdf5f5;
  --surface: #ffffff;
  --surface2: #f7f7f7;
  --border: #e8e0e0;
  --text: #1a1a1a;
  --text-sub: #6b6b6b;
  --text-muted: #aaaaaa;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--brand-bg);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* PC: 최대 너비 제한 + 중앙 정렬 */
@media (min-width: 600px) {
  body { align-items: center; background: #f0eded; }
  .sunraegil-map-tab {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    box-shadow: 0 0 24px rgba(0,0,0,0.12);
  }
}

/* =====================================================
   [통합 시 복사] .sunraegil-map-tab 하위 전체
   ===================================================== */

.sunraegil-map-tab {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* 상단 헤더 */
.sr-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px 10px;
  flex-shrink: 0;
  z-index: 10;
}
.sr-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.sr-header-top h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--brand);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sr-count-badge {
  font-size: 11px;
  background: var(--brand-bg);
  color: var(--brand);
  border: 1px solid #e8c8c8;
  border-radius: 10px;
  padding: 2px 8px;
  font-weight: 600;
}

/* 뷰 전환 버튼 */
.sr-view-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
  border: 1px solid var(--border);
}
.sr-view-btn {
  flex: 1;
  padding: 5px 10px;
  border-radius: 6px;
  border: none;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}
.sr-view-btn.active {
  background: var(--surface);
  color: var(--brand);
  font-weight: 700;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* 필터 */
.sr-filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.sr-filters::-webkit-scrollbar { display: none; }
.sr-filter-btn {
  flex-shrink: 0;
  padding: 4px 11px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.sr-filter-btn.active {
  background: var(--brand);
  border-color: var(--brand);
  color: #fff;
  font-weight: 600;
}

/* 지도 패널 */
.sr-map-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#srKakaoMap {
  width: 100%;
  height: 100%;
}

/* 범례 */
.sr-legend {
  position: absolute;
  bottom: 16px;
  left: 12px;
  background: rgba(255,255,255,0.95);
  border-radius: 8px;
  padding: 8px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 5;
  font-size: 11px;
}
.sr-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-sub);
  line-height: 1.8;
}
.sr-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sr-legend-dot.diocese { background: #8B1C2A; }
.sr-legend-dot.local   { background: #2a6b8b; }

/* 내 위치 버튼 */
.sr-locate-btn {
  position: absolute;
  bottom: 16px;
  right: 12px;
  width: 40px;
  height: 40px;
  background: var(--surface);
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  font-size: 18px;
}

/* 리스트 패널 */
.sr-list-panel {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.sr-list-panel::-webkit-scrollbar { display: none; }
.sr-list-panel.hidden,
.sr-map-panel.hidden { display: none; }

/* 카드 */
.sr-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s;
}
.sr-card:active { transform: scale(0.985); }
.sr-card-body {
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sr-card-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--brand-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sr-card-info { flex: 1; min-width: 0; }
.sr-card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
  word-break: keep-all;
  line-height: 1.3;
}
.sr-card-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}
.sr-badge {
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
}
.sr-badge.diocese { background: #8B1C2A; }
.sr-badge.local   { background: #2a6b8b; }
.sr-card-region { font-size: 11px; color: var(--text-sub); }
.sr-card-arrow { color: var(--text-muted); font-size: 16px; flex-shrink: 0; }

/* 지도 인포윈도우 커스텀 */
.sr-infowindow {
  background: #fff;
  border-radius: 10px;
  padding: 10px 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  min-width: 160px;
  max-width: 220px;
  position: relative;
  border: 1px solid var(--border);
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}
.sr-iw-name {
  font-size: 13px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 5px;
  line-height: 1.3;
  word-break: keep-all;
}
.sr-iw-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 7px;
}
.sr-iw-badge {
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
}
.sr-iw-badge.diocese { background: #8B1C2A; }
.sr-iw-badge.local   { background: #2a6b8b; }
.sr-iw-region { font-size: 11px; color: #666; }
.sr-iw-btn {
  display: block;
  width: 100%;
  padding: 6px;
  background: #8B1C2A;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  font-family: inherit;
}
.sr-iw-tail {
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid #fff;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
}
</style>
</head>
<body>

<div class="sunraegil-map-tab" id="tab-sunraegil">

  <!-- 헤더 -->
  <div class="sr-header">
    <div class="sr-header-top">
      <h2>🚶 순례길 <span class="sr-count-badge" id="srCountBadge">12개</span></h2>
      <div class="sr-view-toggle">
        <button class="sr-view-btn active" id="btnMap" onclick="switchView('map')">🗺 지도</button>
        <button class="sr-view-btn" id="btnList" onclick="switchView('list')">☰ 목록</button>
      </div>
    </div>
    <div class="sr-filters" id="srFilters">
      <button class="sr-filter-btn active" data-filter="all">전체</button>
      <button class="sr-filter-btn" data-filter="diocese">교구 운영</button>
      <button class="sr-filter-btn" data-filter="local">지자체·단체</button>
    </div>
  </div>

  <!-- 지도 -->
  <div class="sr-map-panel" id="srMapPanel">
    <div id="srKakaoMap"></div>
    <div class="sr-legend">
      <div class="sr-legend-item"><div class="sr-legend-dot diocese"></div>교구 운영</div>
      <div class="sr-legend-item"><div class="sr-legend-dot local"></div>지자체·단체</div>
    </div>
    <div class="sr-locate-btn" onclick="moveToMyLocation()" title="내 위치">📍</div>
  </div>

  <!-- 리스트 -->
  <div class="sr-list-panel hidden" id="srListPanel"></div>

</div>

<script>
/* -------------------------------------------------------
   순례길 데이터
------------------------------------------------------- */
const SUNRAEGIL_DATA = [
  { name:"천주교 서울 순례길",     operator:"서울대교구",       type:"diocese", region:"서울시",          lat:37.5644,  lng:127.0104, icon:"✝️",  url:"https://martyrs.or.kr/_web/mpilgrims/about.html" },
  { name:"성지순례길 '디딤길'",    operator:"수원교구",          type:"diocese", region:"수원시",          lat:37.2832,  lng:127.0170, icon:"🙏", url:"https://www.casuwon.or.kr/holyland/pilgrimage" },
  { name:"순례길 '님의 길'",       operator:"원주교구",          type:"diocese", region:"원주·횡성·제천",   lat:37.3420,  lng:127.9200, icon:"🌿", url:"https://sunraegil.seoji.net/course/all" },
  { name:"한티가는길",             operator:"대구대교구",        type:"diocese", region:"칠곡·대구팔공산",  lat:36.0168,  lng:128.6299, icon:"⛰️", url:"https://hantigil.or.kr/index" },
  { name:"노안⇔나주순교자기념성당 외", operator:"광주대교구",   type:"diocese", region:"나주·영광",         lat:35.0369,  lng:126.7152, icon:"🕊️", url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju" },
  { name:"천주교제주순례길",       operator:"제주교구",          type:"diocese", region:"제주",            lat:33.4463,  lng:126.3027, icon:"🌊", url:"http://santoviaggio.com/course/10?sca=%EC%A0%84%EC%B2%B4%EC%BD%94%EC%8A%A4&id=0301" },
  { name:"사제와 함께하는 도보순례", operator:"안동교구",        type:"diocese", region:"문경·상주",         lat:36.8001,  lng:128.2113, icon:"👣", url:"https://www.acatholic.or.kr/sub4/sub2.asp" },
  { name:"요안루갈다길 외",        operator:"전주교구",          type:"diocese", region:"전주·완주",         lat:35.8031,  lng:127.1677, icon:"🌾", url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html" },
  { name:"원주 산티아고",          operator:"원주시청",          type:"local",   region:"원주·횡성·제천",   lat:37.3800,  lng:127.9800, icon:"🏔️", url:"https://www.wonju.go.kr/tour/contents.do?key=5512" },
  { name:"성지순례길",             operator:"보령시",            type:"local",   region:"보령",            lat:36.4280,  lng:126.5075, icon:"🌅", url:"https://www.brcn.go.kr/tour/sub02_02_02.do" },
  { name:"내포 천주교 순례길",     operator:"사단법인 내포문화숲길", type:"local", region:"예산·서산",      lat:36.7127,  lng:126.5380, icon:"🌲", url:"https://naepotrail.org/course/catholic" },
  { name:"버그내순례길",           operator:"당진시청",          type:"local",   region:"당진",            lat:36.8199,  lng:126.7848, icon:"🏞️", url:"https://beogeunae.dangjin.go.kr/pil1.html" }
];

/* -------------------------------------------------------
   카카오 지도 초기화
------------------------------------------------------- */
let map, markers = [], infowindow = null, currentFilter = 'all';

function initSunraegilMap() {
  const container = document.getElementById('srKakaoMap');
  const options = {
    center: new kakao.maps.LatLng(36.5, 127.8),
    level: 8
  };
  map = new kakao.maps.Map(container, options);

  // 지도 컨트롤
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // 마커 & 인포윈도우 생성
  renderMarkers('all');
  renderList('all');

  // 필터 버튼 이벤트
  document.querySelectorAll('.sr-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sr-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderMarkers(currentFilter);
      renderList(currentFilter);
      updateCount(currentFilter);
    });
  });
}

/* -------------------------------------------------------
   커스텀 마커 이미지 SVG
------------------------------------------------------- */
function makeMarkerSVG(color, emoji) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="50" viewBox="0 0 40 50">
    <ellipse cx="20" cy="47" rx="8" ry="3" fill="rgba(0,0,0,0.15)"/>
    <path d="M20 2 C10 2 2 10 2 20 C2 32 20 46 20 46 C20 46 38 32 38 20 C38 10 30 2 20 2Z" fill="${color}" stroke="white" stroke-width="2"/>
    <text x="20" y="26" text-anchor="middle" font-size="16">${emoji}</text>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

/* -------------------------------------------------------
   마커 렌더
------------------------------------------------------- */
function renderMarkers(filter) {
  // 기존 마커 제거
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (infowindow) { infowindow.close(); infowindow = null; }

  const filtered = filter === 'all' ? SUNRAEGIL_DATA : SUNRAEGIL_DATA.filter(d => d.type === filter);

  filtered.forEach(d => {
    const color = d.type === 'diocese' ? '#8B1C2A' : '#2a6b8b';
    const markerImg = new kakao.maps.MarkerImage(
      makeMarkerSVG(color, d.icon),
      new kakao.maps.Size(40, 50),
      { offset: new kakao.maps.Point(20, 50) }
    );
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(d.lat, d.lng),
      map: map,
      image: markerImg,
      title: d.name
    });

    // 클릭 이벤트 → 인포윈도우
    kakao.maps.event.addListener(marker, 'click', () => {
      if (infowindow) infowindow.setMap(null);

      const badgeClass = d.type === 'diocese' ? 'diocese' : 'local';
      const badgeLabel = d.type === 'diocese' ? '교구' : '지자체·단체';
      const content = `
        <div class="sr-infowindow">
          <div class="sr-iw-name">${d.icon} ${d.name}</div>
          <div class="sr-iw-meta">
            <span class="sr-iw-badge ${badgeClass}">${badgeLabel}</span>
            <span class="sr-iw-region">📍 ${d.region}</span>
          </div>
          <div style="font-size:11px;color:#888;margin-bottom:7px;">${d.operator}</div>
          <a class="sr-iw-btn" href="${d.url}" target="_blank" rel="noopener">홈페이지 방문 →</a>
          <div class="sr-iw-tail"></div>
        </div>`;

      infowindow = new kakao.maps.CustomOverlay({
        content: content,
        position: new kakao.maps.LatLng(d.lat, d.lng),
        yAnchor: 1.55,
        zIndex: 10
      });
      infowindow.setMap(map);
      map.panTo(new kakao.maps.LatLng(d.lat, d.lng));
    });

    markers.push(marker);
  });

  // 지도 클릭 시 인포윈도우 닫기
  kakao.maps.event.addListener(map, 'click', () => {
    if (infowindow) { infowindow.setMap(null); infowindow = null; }
  });
}

/* -------------------------------------------------------
   리스트 렌더
------------------------------------------------------- */
function renderList(filter) {
  const panel = document.getElementById('srListPanel');
  panel.innerHTML = '';
  const filtered = filter === 'all' ? SUNRAEGIL_DATA : SUNRAEGIL_DATA.filter(d => d.type === filter);
  
  filtered.forEach(d => {
    const badgeClass = d.type === 'diocese' ? 'diocese' : 'local';
    const badgeLabel = d.type === 'diocese' ? '교구' : '지자체·단체';
    const card = document.createElement('div');
    card.className = 'sr-card';
    card.innerHTML = `
      <div class="sr-card-body">
        <div class="sr-card-icon">${d.icon}</div>
        <div class="sr-card-info">
          <div class="sr-card-name">${d.name}</div>
          <div class="sr-card-meta">
            <span class="sr-badge ${badgeClass}">${badgeLabel}</span>
            <span class="sr-card-region">📍 ${d.region}</span>
          </div>
          <div style="font-size:11px;color:#888;margin-top:2px;">${d.operator}</div>
        </div>
        <span class="sr-card-arrow">›</span>
      </div>`;

    // 카드 클릭 → 지도로 전환 후 마커 포커스
    card.addEventListener('click', () => {
      switchView('map');
      map.setLevel(6);
      map.panTo(new kakao.maps.LatLng(d.lat, d.lng));
      // 해당 마커 클릭 이벤트 트리거
      const idx = (filter === 'all' ? SUNRAEGIL_DATA : SUNRAEGIL_DATA.filter(x => x.type === filter)).indexOf(d);
      if (markers[idx]) kakao.maps.event.trigger(markers[idx], 'click');
    });

    panel.appendChild(card);
  });
}

function updateCount(filter) {
  const n = filter === 'all' ? SUNRAEGIL_DATA.length : SUNRAEGIL_DATA.filter(d => d.type === filter).length;
  document.getElementById('srCountBadge').textContent = n + '개';
}

/* -------------------------------------------------------
   뷰 전환 (지도 ↔ 목록)
------------------------------------------------------- */
function switchView(view) {
  const mapPanel  = document.getElementById('srMapPanel');
  const listPanel = document.getElementById('srListPanel');
  const btnMap    = document.getElementById('btnMap');
  const btnList   = document.getElementById('btnList');

  if (view === 'map') {
    mapPanel.classList.remove('hidden');
    listPanel.classList.add('hidden');
    btnMap.classList.add('active');
    btnList.classList.remove('active');
    // 지도 크기 재계산
    if (map) kakao.maps.event.trigger(map, 'resize');
  } else {
    mapPanel.classList.add('hidden');
    listPanel.classList.remove('hidden');
    btnMap.classList.remove('active');
    btnList.classList.add('active');
  }
}

/* -------------------------------------------------------
   내 위치 이동
------------------------------------------------------- */
function moveToMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const latlng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    map.panTo(latlng);
    map.setLevel(6);
  });
}

/* -------------------------------------------------------
   초기화 실행
------------------------------------------------------- */
kakao.maps.load(() => initSunraegilMap());
</script>
</body>
</html>
