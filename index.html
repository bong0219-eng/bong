<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 순례길</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0"></script>
<style>
:root {
  --brand:    #7a1828;
  --brand-lt: #f5eced;
  --local:    #1b5e8a;
  --local-lt: #edf3f8;
  --bg:       #f9f6f6;
  --card:     #ffffff;
  --border:   #ebe3e3;
  --text:     #222;
  --sub:      #666;
  --dim:      #b0a8a8;
  --r:        13px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#d0c8c8;
  display:flex;align-items:center;justify-content:center;
}

/* ── 앱 래퍼 ── */
.app{
  width:100%; height:100%;
  max-width:520px;
  display:flex; flex-direction:column;
  background:var(--bg);
  overflow:hidden;
  position:relative;
}

/* ── 탭: 활성=브랜드 배경 흰글씨 / 비활성=연한배경 흐린글씨 ── */
.tabs{
  display:flex; flex-shrink:0; height:50px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  z-index:30;
}
.tab{
  flex:1; border:none; cursor:pointer;
  font-family:inherit; font-size:15px; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:background .15s, color .15s;
  background:#f0e8e8; color:#c0aaaa;
}
.tab:first-child{border-right:1px solid var(--border);}
.tab.on{background:var(--brand); color:#fff;}

/* ── 지도 ── */
.map-wrap{
  flex:1; position:relative; min-height:0;
  display:flex; flex-direction:column;
}
#kmap{flex:1; width:100%;}

/* 내 위치 */
.loc-btn{
  position:absolute; bottom:20px; right:14px; z-index:15;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:22px; box-shadow:0 2px 12px rgba(0,0,0,.18);
  padding:9px 16px; display:flex; align-items:center; gap:6px;
  font-family:inherit; font-size:13px; font-weight:700;
  color:var(--brand); cursor:pointer;
}

/* ── 바텀시트 (지도 DOM 밖) ── */
.sheet{
  position:absolute; left:0; right:0; bottom:0; z-index:20;
  background:var(--card);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  box-shadow:0 -6px 28px rgba(0,0,0,.14);
  padding:8px 18px 28px;
  transform:translateY(110%);
  transition:transform .26s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.sheet.open{transform:translateY(0); pointer-events:all;}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:#ddd;margin:8px auto 16px;}
.sheet-close{
  position:absolute; top:14px; right:16px;
  width:26px; height:26px; border-radius:50%;
  background:#f0e8e8; border:none; cursor:pointer;
  font-size:13px; color:#888; display:flex; align-items:center; justify-content:center;
}
.sheet-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.s-badge{
  font-size:11.5px; font-weight:800;
  padding:4px 10px; border-radius:6px; color:#fff; white-space:nowrap;
}
.s-badge.d{background:var(--brand);}
.s-badge.l{background:var(--local);}
.sheet-region{font-size:12px; color:var(--sub);}
.sheet-name{font-size:16px; font-weight:800; color:var(--text); line-height:1.45; word-break:keep-all; margin-bottom:14px;}
.sheet-go{
  display:block; width:100%; padding:13px;
  border:none; border-radius:11px;
  font-size:14px; font-weight:800; color:#fff;
  cursor:pointer; font-family:inherit; text-align:center;
}
.sheet-go.d{background:var(--brand);}
.sheet-go.l{background:var(--local);}

/* ── 목록 (스크롤 핵심 수정) ── */
.list-wrap{
  /* flex:1 + min-height:0 + overflow-y:scroll 이 3가지가 스크롤 핵심 */
  flex:1; min-height:0;
  overflow-y:scroll; -webkit-overflow-scrolling:touch;
  padding:14px 13px 60px;
  display:flex; flex-direction:column; gap:11px;
}
.list-wrap::-webkit-scrollbar{display:none;}

/* hidden 클래스 — display:none 으로만, flex 속성 덮어쓰지 않게 */
.hidden{display:none!important;}

/* ── 카드 ── */
.card{
  background:var(--card);
  border-radius:var(--r);
  border:1px solid var(--border);
  box-shadow:0 1px 8px rgba(0,0,0,.07);
  flex-shrink:0; /* 카드가 찌그러지지 않게 */
}

.card-r1{
  display:flex; align-items:center; gap:8px;
  padding:13px 14px 7px;
}
.c-badge{
  font-size:11.5px; font-weight:800;
  padding:4px 10px; border-radius:6px;
  color:#fff; white-space:nowrap; flex-shrink:0;
}
.c-badge.d{background:var(--brand);}
.c-badge.l{background:var(--local);}
.c-region{font-size:12px; color:var(--sub);}

.card-r2{
  display:flex; align-items:center; gap:12px;
  padding:0 14px 11px;
}
.c-ico{
  width:46px; height:46px; flex-shrink:0;
  border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  font-size:23px;
}
.c-ico.d{background:var(--brand-lt);}
.c-ico.l{background:var(--local-lt);}
.c-name{
  font-size:15.5px; font-weight:700; color:var(--text);
  word-break:keep-all; line-height:1.4;
}

.card-r3{
  display:flex; gap:8px;
  padding:0 14px 13px;
}
.c-btn{
  flex:1; padding:11px 0; border:none; border-radius:9px;
  font-size:13.5px; font-weight:800; color:#fff;
  cursor:pointer; font-family:inherit; text-align:center;
  -webkit-tap-highlight-color:rgba(0,0,0,.08);
}
.c-btn.go.d{background:var(--brand);}
.c-btn.go.l{background:var(--local);}
.c-btn.mp{
  background:var(--bg);
  color:var(--sub)!important;
  border:1.5px solid var(--border);
  font-weight:700;
}

/* 내 위치 점 */
.myloc{
  width:16px; height:16px; border-radius:50%;
  background:#3d82f4; border:2.5px solid #fff;
  box-shadow:0 0 0 4px rgba(61,130,244,.22);
}
</style>
</head>
<body>

<script>
(function(){
  var ua=navigator.userAgent||'';
  if(!/KAKAOTALK/i.test(ua)) return;
  if(/iPhone|iPad/i.test(ua)){
    document.write('<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;gap:20px;background:#f9f6f6;font-family:sans-serif"><div style="font-size:44px">🌐</div><div style="font-size:17px;font-weight:800;color:#7a1828">Safari에서 열어주세요</div><div style="font-size:13px;color:#666;line-height:1.9">하단 <b>···</b> → <b>Safari로 열기</b></div></div>');
    return;
  }
  location.href='intent://'+location.href.replace(/https?:\/\//,'')+'#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
})();
</script>

<div class="app">
  <div class="tabs">
    <button class="tab on"  id="tabMap"  onclick="setView('map')">🗺 지도</button>
    <button class="tab"     id="tabList" onclick="setView('list')">☰ 목록</button>
  </div>

  <!-- 지도 뷰 -->
  <div class="map-wrap" id="viewMap">
    <div id="kmap"></div>

    <!-- 바텀시트: 카카오 DOM 완전 밖 → 버튼 100% 동작 -->
    <div class="sheet" id="sheet">
      <button class="sheet-close" onclick="closeSheet()">✕</button>
      <div class="sheet-handle"></div>
      <div class="sheet-top">
        <span class="s-badge" id="shBadge"></span>
        <span class="sheet-region" id="shRegion"></span>
      </div>
      <div class="sheet-name" id="shName"></div>
      <button class="sheet-go" id="shGo">홈페이지 방문 →</button>
    </div>

    <button class="loc-btn" onclick="myLoc()">📍 내 위치</button>
  </div>

  <!-- 목록 뷰 -->
  <div class="list-wrap hidden" id="viewList"></div>
</div>

<script>
var D=[
  {n:"천주교 서울 순례길",        op:"서울대교구",            t:"d",r:"서울시",         lat:37.5644,lng:127.0104,url:"https://martyrs.or.kr/_web/mpilgrims/about.html"},
  {n:"성지순례길 '디딤길'",       op:"수원교구",              t:"d",r:"수원시",         lat:37.2832,lng:127.0170,url:"https://www.casuwon.or.kr/holyland/pilgrimage"},
  {n:"순례길 '님의 길'",          op:"원주교구",              t:"d",r:"원주·횡성·제천",  lat:37.3420,lng:127.9200,url:"https://sunraegil.seoji.net/course/all"},
  {n:"한티가는길",                op:"대구대교구",            t:"d",r:"칠곡·대구팔공산", lat:36.0168,lng:128.6299,url:"https://hantigil.or.kr/index"},
  {n:"광주대교구 순례길",         op:"광주대교구",            t:"d",r:"나주·영광",        lat:35.0369,lng:126.7152,url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju"},
  {n:"천주교제주순례길",          op:"제주교구",              t:"d",r:"제주",            lat:33.4463,lng:126.3027,url:"http://santoviaggio.com/course/10?sca=%EC%A0%84%EC%B2%B4%EC%BD%94%EC%8A%A4&id=0301"},
  {n:"사제와 함께하는 도보순례",  op:"안동교구",              t:"d",r:"문경·상주",         lat:36.8001,lng:128.2113,url:"https://www.acatholic.or.kr/sub4/sub2.asp"},
  {n:"요안루갈다길 외",           op:"전주교구",              t:"d",r:"전주·완주",         lat:35.8031,lng:127.1677,url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html"},
  {n:"보령 갈매못 성지순례길",    op:"보령시",                t:"l",r:"보령",            lat:36.4280,lng:126.5075,url:"https://www.brcn.go.kr/tour/sub02_02_02.do"},
  {n:"내포 천주교 순례길",        op:"사단법인 내포문화숲길", t:"l",r:"예산·서산",          lat:36.7127,lng:126.5380,url:"https://naepotrail.org/course/catholic"},
  {n:"버그내순례길",              op:"당진시청",              t:"l",r:"당진",            lat:36.8199,lng:126.7848,url:"https://beogeunae.dangjin.go.kr/pil1.html"}
];

var map, MK=[], selIdx=-1, myOv=null;

/* ── 마커 SVG: 깔끔한 원형 핀 ──
   - 이모지 제거, 숫자 번호로 표시
   - 선택 시: 흰 테두리 링 + 크기 확대
*/
function pinSVG(color, label, active){
  var r = active ? 18 : 13;
  var W = active ? 56 : 40;
  var H = active ? 68 : 50;
  var cx = W/2, cy = r+2;
  /* 핀 모양: 원 + 아래 삼각형 꼬리 */
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
  /* 그림자 */
  svg += '<ellipse cx="'+cx+'" cy="'+(H-3)+'" rx="'+(r*.7)+'" ry="'+(active?5:3)+'" fill="rgba(0,0,0,'+(active?.18:.12)+')" />';
  /* 꼬리 */
  svg += '<polygon points="'+(cx-6)+','+(cy+r-2)+' '+(cx+6)+','+(cy+r-2)+' '+cx+','+(H-6)+'" fill="'+color+'"/>';
  /* 활성: 외곽 링 */
  if(active){
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r+4)+'" fill="white" opacity="0.5"/>';
  }
  /* 원 본체 */
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+color+'" />';
  /* 흰 테두리 */
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="white" stroke-width="'+(active?2.5:2)+'"/>';
  /* 라벨 */
  svg += '<text x="'+cx+'" y="'+(cy+1)+'" text-anchor="middle" dominant-baseline="middle"'
       + ' font-family="Apple SD Gothic Neo,sans-serif" font-size="'+(active?13:10)+'" font-weight="800" fill="white">'+label+'</text>';
  svg += '</svg>';
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}

/* 라벨: 순서 번호 표시 */
function lbl(i){ return String(i+1); }

kakao.maps.load(function(){
  map=new kakao.maps.Map(document.getElementById('kmap'),{
    center:new kakao.maps.LatLng(36.2,127.9), level:13
  });
  map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);

  D.forEach(function(d,i){
    var c=d.t==='d'?'#7a1828':'#1b5e8a';
    var mk=new kakao.maps.Marker({
      position:new kakao.maps.LatLng(d.lat,d.lng), map:map,
      image:new kakao.maps.MarkerImage(pinSVG(c,lbl(i),false),new kakao.maps.Size(40,50),{offset:new kakao.maps.Point(20,50)}),
      title:d.n,
      zIndex:Math.round(d.lat*1000)
    });
    (function(d,i,c){
      kakao.maps.event.addListener(mk,'click',function(){ selMk(i,c); openSheet(i); });
    })(d,i,c);
    MK.push({mk:mk,c:c});
  });

  kakao.maps.event.addListener(map,'click',closeSheet);
  buildList();
});

function selMk(idx,c){
  if(selIdx>=0){
    var p=MK[selIdx];
    p.mk.setImage(new kakao.maps.MarkerImage(pinSVG(p.c,lbl(selIdx),false),new kakao.maps.Size(40,50),{offset:new kakao.maps.Point(20,50)}));
    p.mk.setZIndex(Math.round(D[selIdx].lat*1000));
  }
  selIdx=idx;
  MK[idx].mk.setImage(new kakao.maps.MarkerImage(pinSVG(c,lbl(idx),true),new kakao.maps.Size(56,68),{offset:new kakao.maps.Point(28,68)}));
  MK[idx].mk.setZIndex(9999);
}

function openSheet(i){
  var d=D[i], bc=d.t==='d'?'d':'l';
  document.getElementById('shBadge').textContent=d.op;
  document.getElementById('shBadge').className='s-badge '+bc;
  document.getElementById('shRegion').textContent='📍 '+d.r;
  document.getElementById('shName').textContent=d.n;
  var btn=document.getElementById('shGo');
  btn.className='sheet-go '+bc;
  btn.onclick=function(){ location.href=d.url; };
  document.getElementById('sheet').classList.add('open');
  map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  if(selIdx>=0){
    var p=MK[selIdx];
    p.mk.setImage(new kakao.maps.MarkerImage(pinSVG(p.c,lbl(selIdx),false),new kakao.maps.Size(40,50),{offset:new kakao.maps.Point(20,50)}));
    p.mk.setZIndex(Math.round(D[selIdx].lat*1000));
    selIdx=-1;
  }
}

function buildList(){
  var wrap=document.getElementById('viewList');
  wrap.innerHTML='';
  D.forEach(function(d,i){
    var bc=d.t==='d'?'d':'l';
    var card=document.createElement('div'); card.className='card';

    /* 행1 */
    var r1=document.createElement('div'); r1.className='card-r1';
    var b=document.createElement('span'); b.className='c-badge '+bc; b.textContent=d.op;
    var rg=document.createElement('span'); rg.className='c-region'; rg.textContent='📍 '+d.r;
    r1.appendChild(b); r1.appendChild(rg);

    /* 행2 */
    var r2=document.createElement('div'); r2.className='card-r2';
    var ico=document.createElement('div'); ico.className='c-ico '+bc;
    /* 번호 뱃지 */
    ico.innerHTML='<span style="font-size:18px;font-weight:900;color:'+(bc==='d'?'#7a1828':'#1b5e8a')+'">'+(i+1)+'</span>';
    var nm=document.createElement('div'); nm.className='c-name'; nm.textContent=d.n;
    r2.appendChild(ico); r2.appendChild(nm);

    /* 행3 */
    var r3=document.createElement('div'); r3.className='card-r3';
    var goB=document.createElement('button'); goB.className='c-btn go '+bc; goB.textContent='🔗 홈페이지';
    goB.addEventListener('click',(function(url){return function(e){e.stopPropagation();location.href=url;};})(d.url));
    var mpB=document.createElement('button'); mpB.className='c-btn mp'; mpB.textContent='🗺 지도';
    mpB.addEventListener('click',(function(d,i){return function(e){
      e.stopPropagation(); setView('map');
      setTimeout(function(){
        map.setLevel(8); map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
        selMk(i,d.t==='d'?'#7a1828':'#1b5e8a'); openSheet(i);
      },80);
    };})(d,i));
    r3.appendChild(goB); r3.appendChild(mpB);

    card.appendChild(r1); card.appendChild(r2); card.appendChild(r3);
    wrap.appendChild(card);
  });
}

function setView(v){
  var vm=document.getElementById('viewMap'), vl=document.getElementById('viewList');
  var tm=document.getElementById('tabMap'),  tl=document.getElementById('tabList');
  if(v==='map'){
    vm.classList.remove('hidden'); vl.classList.add('hidden');
    tm.classList.add('on'); tl.classList.remove('on');
    if(map) setTimeout(function(){kakao.maps.event.trigger(map,'resize');},10);
  } else {
    vm.classList.add('hidden'); vl.classList.remove('hidden');
    tm.classList.remove('on'); tl.classList.add('on');
  }
}

function myLoc(){
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  function show(pos){
    var ll=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
    map.panTo(ll); map.setLevel(7);
    if(myOv) myOv.setMap(null);
    var dot=document.createElement('div'); dot.className='myloc';
    myOv=new kakao.maps.CustomOverlay({content:dot,position:ll,yAnchor:.5,zIndex:100});
    myOv.setMap(map);
  }
  navigator.geolocation.getCurrentPosition(show,
    function(e){alert(e.code===1?'위치 권한을 허용해 주세요.':'위치를 가져올 수 없습니다.');},
    {enableHighAccuracy:false,timeout:5000,maximumAge:60000});
  navigator.geolocation.getCurrentPosition(show,function(){},{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}
</script>
</body>
</html>
