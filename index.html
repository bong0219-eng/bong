<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PWA 테스트 앱</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="테스트앱">
  
  <link rel="apple-touch-icon" href="icon-192x192.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background-color: #f4f4f9;
      color: #333;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h1 { color: #3498db; }
    .status { font-weight: bold; color: #e74c3c; margin-top: 20px; }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var userAgent = navigator.userAgent.toLowerCase();
      var targetUrl = location.href;
      var statusText = document.getElementById("browser-status");

      if (userAgent.match(/kakaotalk/i)) {
        statusText.innerText = "현재 카카오톡 인앱 브라우저입니다.";
        statusText.style.color = "#e74c3c";

        if (userAgent.match(/android/i)) {
          // 안드로이드 카카오톡: 크롬으로 강제 이동
          var intentUrl = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
          location.href = intentUrl;
        } else if (userAgent.match(/iphone|ipad|ipod/i)) {
          // iOS 카카오톡: 사파리로 열기 안내
          alert("카톡에서는 앱 설치가 불가능합니다.\n\n우측 하단의 [ ⋯ ] 버튼을 누르고\n[ Safari로 열기 ]를 선택해 주세요.");
        }
      } else {
        statusText.innerText = "현재 일반 브라우저(크롬/사파리)입니다. 홈 화면에 추가해보세요!";
        statusText.style.color = "#2ecc71";
      }
    });
  </script>
</head>
<body>

  <div class="box">
    <h1>🚀 웹앱 테스트</h1>
    <p>이 페이지는 주소창 없이 실행되는<br>웹앱(PWA) 테스트 화면입니다.</p>
    <p id="browser-status" class="status">브라우저 환경 확인 중...</p>
  </div>

  <div class="box">
    <h3>💡 테스트 방법</h3>
    <ul style="text-align: left; line-height: 1.6;">
      <li><strong>안드로이드:</strong> 브라우저 메뉴(⋮) > <b>[홈 화면에 추가]</b></li>
      <li><strong>아이폰(iOS):</strong> 하단 공유 버튼(⍐) > <b>[홈 화면에 추가]</b></li>
      <li>바탕화면에 생성된 아이콘을 눌러 실행하면 주소창이 사라집니다!</li>
    </ul>
  </div>

</body>
</html>
