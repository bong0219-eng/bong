<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 순례길</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0"></script>
<style>
/* ── 변수 ── */
:root {
  --c-brand:  #8B1C2A;
  --c-local:  #1a5f8b;
  --c-bg:     #f8f3f3;
  --c-card:   #ffffff;
  --c-border: #e0d4d4;
  --c-text:   #1a1a1a;
  --c-sub:    #5a5a5a;
  --c-dim:    #aaa;
  --radius:   14px;
}

/* ── 리셋 / 레이아웃 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #bbb;
  display: flex; align-items: center; justify-content: center;
}

/* ── 앱 래퍼 ── */
.app {
  width: 100%; height: 100%;
  max-width: 520px;
  display: flex; flex-direction: column;
  background: var(--c-bg);
  overflow: hidden;
  position: relative;
}

/* ────────────────────────
   탭: 활성=브랜드 배경+흰글씨 / 비활성=흰배경+회색글씨
──────────────────────── */
.tabs {
  display: flex; flex-shrink: 0;
  height: 52px;
  background: var(--c-card);
  border-bottom: 1.5px solid var(--c-border);
  z-index: 30;
}
.tab {
  flex: 1; border: none; cursor: pointer;
  font-family: inherit; font-size: 16px; font-weight: 800;
  letter-spacing: -0.3px;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .18s, color .18s;
  /* 비활성 */
  background: #f0eaea; color: #bbb;
}
.tab:first-child { border-right: 1.5px solid var(--c-border); }
/* 활성 */
.tab.on {
  background: var(--c-brand); color: #fff;
}

/* ────────────────────────
   지도 패널
──────────────────────── */
.map-wrap {
  flex: 1; position: relative; min-height: 0;
  display: flex; flex-direction: column;
}
#kmap { flex: 1; width: 100%; }

/* 내 위치 버튼 */
.loc-btn {
  position: absolute; bottom: 18px; right: 14px;
  z-index: 15;
  background: var(--c-card);
  border: 1.5px solid var(--c-border);
  border-radius: 22px;
  box-shadow: 0 3px 14px rgba(0,0,0,.22);
  padding: 9px 16px;
  display: flex; align-items: center; gap: 6px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  color: var(--c-brand); cursor: pointer;
}

/* ────────────────────────
   바텀시트 — 지도 위에 float, 카카오 DOM 밖
──────────────────────── */
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
  background: var(--c-card);
  border-radius: 18px 18px 0 0;
  border-top: 1.5px solid var(--c-border);
  box-shadow: 0 -4px 24px rgba(0,0,0,.18);
  padding: 6px 16px 24px;
  /* 기본: 숨김 */
  transform: translateY(110%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.sheet.open {
  transform: translateY(0);
  pointer-events: all;
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: #ddd; margin: 8px auto 14px;
}
.sheet-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.sheet-badge {
  font-size: 12px; font-weight: 800;
  padding: 4px 11px; border-radius: 6px; color: #fff; white-space: nowrap;
}
.sheet-badge.d { background: var(--c-brand); }
.sheet-badge.l { background: var(--c-local); }
.sheet-region { font-size: 12.5px; color: var(--c-sub); }
.sheet-name {
  font-size: 17px; font-weight: 800; color: var(--c-text);
  line-height: 1.4; word-break: keep-all; margin-bottom: 14px;
}
/* ★ 홈페이지 버튼: 지도 DOM 완전 밖 → location.href 100% 동작 */
.sheet-btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 800; color: #fff;
  cursor: pointer; font-family: inherit; text-align: center;
  letter-spacing: -0.2px;
  -webkit-tap-highlight-color: rgba(0,0,0,.1);
}
.sheet-btn.d { background: var(--c-brand); }
.sheet-btn.l { background: var(--c-local); }
.sheet-close {
  position: absolute; top: 12px; right: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #eee; border: none; cursor: pointer;
  font-size: 14px; color: #888;
  display: flex; align-items: center; justify-content: center;
}

/* ────────────────────────
   목록 패널
──────────────────────── */
.list-wrap {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 13px 60px;
  display: flex; flex-direction: column; gap: 12px;
  min-height: 0;
}
.list-wrap::-webkit-scrollbar { display: none; }

/* ────────────────────────
   카드 — 모든 정보 노출
──────────────────────── */
.card {
  background: var(--c-card);
  border-radius: var(--radius);
  border: 1px solid var(--c-border);
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
  overflow: visible; /* 잘림 방지 */
}

/* 교구명+지역 행 */
.card-row1 {
  display: flex; align-items: center; gap: 8px;
  padding: 13px 14px 8px;
}
.card-badge {
  font-size: 12px; font-weight: 800;
  padding: 4px 11px; border-radius: 6px;
  color: #fff; white-space: nowrap; flex-shrink: 0;
}
.card-badge.d { background: var(--c-brand); }
.card-badge.l { background: var(--c-local); }
.card-region { font-size: 12.5px; color: var(--c-sub); }

/* 아이콘+이름 행 */
.card-row2 {
  display: flex; align-items: center; gap: 12px;
  padding: 0 14px 12px;
}
.card-ico {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: 12px; background: var(--c-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.card-name {
  font-size: 16px; font-weight: 700; color: var(--c-text);
  word-break: keep-all; line-height: 1.4; white-space: normal;
}

/* 버튼 행 */
.card-row3 {
  display: flex; gap: 8px;
  padding: 0 14px 14px;
}
.card-btn {
  flex: 1; padding: 11px 0;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 800; color: #fff;
  cursor: pointer; font-family: inherit; text-align: center;
  letter-spacing: -0.2px;
  -webkit-tap-highlight-color: rgba(0,0,0,.1);
}
.card-btn.go.d  { background: var(--c-brand); }
.card-btn.go.l  { background: var(--c-local); }
.card-btn.map   {
  background: var(--c-bg);
  color: var(--c-sub) !important;
  border: 1.5px solid var(--c-border);
  color: var(--c-brand);
  font-weight: 700;
}

/* 숨김 */
.hidden { display: none !important; }

/* 내 위치 점 */
.myloc {
  width: 18px; height: 18px; border-radius: 50%;
  background: #4285f4; border: 3px solid #fff;
  box-shadow: 0 0 0 4px rgba(66,133,244,.28);
}
</style>
</head>
<body>

<!-- 카카오톡 인앱 감지 -->
<script>
(function(){
  var ua = navigator.userAgent||'';
  if(!/KAKAOTALK/i.test(ua)) return;
  if(/iPhone|iPad/i.test(ua)){
    document.write('<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;gap:20px;background:#fdf5f5;font-family:sans-serif"><div style="font-size:48px">🌐</div><div style="font-size:18px;font-weight:800;color:#8B1C2A">Safari에서 열어주세요</div><div style="font-size:14px;color:#555;line-height:1.9">하단 <b>···</b> 메뉴 →<br><b>Safari로 열기</b></div></div>');

<div class="app">

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab on"  id="tabMap"  onclick="setView('map')">🗺 지도</button>
    <button class="tab"     id="tabList" onclick="setView('list')">☰ 목록</button>
  </div>

  <!-- 지도 뷰 -->
  <div class="map-wrap" id="viewMap">
    <div id="kmap"></div>

    <!-- ★ 바텀시트: 카카오 DOM 완전 밖 → 버튼 클릭 100% 동작 -->
    <div class="sheet" id="sheet">
      <button class="sheet-close" onclick="closeSheet()">✕</button>
      <div class="sheet-handle"></div>
      <div class="sheet-top">
        <span class="sheet-badge" id="shBadge"></span>
        <span class="sheet-region" id="shRegion"></span>
      </div>
      <div class="sheet-name" id="shName"></div>
      <button class="sheet-btn" id="shBtn">홈페이지 방문 →</button>
    </div>

    <button class="loc-btn" onclick="myLoc()">📍 내 위치</button>
  </div>

  <!-- 목록 뷰 -->
  <div class="list-wrap hidden" id="viewList"></div>

</div>

<script>
/* ── 데이터 ── */
var D = [
  {n:"천주교 서울 순례길",        op:"서울대교구",            t:"d", r:"서울시",          lat:37.5644, lng:127.0104, ico:"✝️",  url:"https://martyrs.or.kr/_web/mpilgrims/about.html"},
  {n:"성지순례길 '디딤길'",       op:"수원교구",              t:"d", r:"수원시",          lat:37.2832, lng:127.0170, ico:"🙏",  url:"https://www.casuwon.or.kr/holyland/pilgrimage"},
  {n:"순례길 '님의 길'",          op:"원주교구",              t:"d", r:"원주·횡성·제천",   lat:37.3420, lng:127.9200, ico:"🌿",  url:"https://sunraegil.seoji.net/course/all"},
  {n:"한티가는길",                op:"대구대교구",            t:"d", r:"칠곡·대구팔공산",  lat:36.0168, lng:128.6299, ico:"⛰️", url:"https://hantigil.or.kr/index"},
  {n:"광주대교구 순례길",         op:"광주대교구",            t:"d", r:"나주·영광",         lat:35.0369, lng:126.7152, ico:"🕊️", url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju"},
  {n:"천주교제주순례길",          op:"제주교구",              t:"d", r:"제주",             lat:33.4463, lng:126.3027, ico:"🌊",  url:"http://santoviaggio.com/course/10?sca=%EC%A0%84%EC%B2%B4%EC%BD%94%EC%8A%A4&id=0301"},
  {n:"사제와 함께하는 도보순례",  op:"안동교구",              t:"d", r:"문경·상주",          lat:36.8001, lng:128.2113, ico:"👣",  url:"https://www.acatholic.or.kr/sub4/sub2.asp"},
  {n:"요안루갈다길 외",           op:"전주교구",              t:"d", r:"전주·완주",          lat:35.8031, lng:127.1677, ico:"🌾",  url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html"},
  {n:"보령 갈매못 성지순례길",    op:"보령시",                t:"l", r:"보령",             lat:36.4280, lng:126.5075, ico:"🌅",  url:"https://www.brcn.go.kr/tour/sub02_02_02.do"},
  {n:"내포 천주교 순례길",        op:"사단법인 내포문화숲길", t:"l", r:"예산·서산",           lat:36.7127, lng:126.5380, ico:"🌲",  url:"https://naepotrail.org/course/catholic"},
  {n:"버그내순례길",              op:"당진시청",              t:"l", r:"당진",             lat:36.8199, lng:126.7848, ico:"🏞️", url:"https://beogeunae.dangjin.go.kr/pil1.html"}
];

var map, markers=[], selIdx=-1, myLocOv=null;

/* ── 마커 SVG 생성 ── */
function mkSVG(color, emoji, big){
  var w=big?52:42, h=big?64:52;
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'
    +'<ellipse cx="'+(w/2)+'" cy="'+(h-3)+'" rx="'+(w/2-4)+'" ry="4" fill="rgba(0,0,0,'+(big?.2:.13)+')" />'
    +'<path d="M'+(w/2)+' 2C'+(w/2-10)+' 2 4 '+(w/2-6)+' 4 '+(w/2+2)+'c0 '+(h/2-10)+' '+(w/2-4)+' '+(h-18)+' '+(w/2-4)+' '+(h-18)
      +'S'+(w-4)+' '+(w/2+h/2-8)+' '+(w-4)+' '+(w/2+2)+'C'+(w-4)+' '+(w/2-6)+' '+(w-4)+' 2 '+(w/2)+' 2Z"'
    +' fill="'+color+'" stroke="white" stroke-width="'+(big?3:2.5)+'"/>'
    +'<text x="'+(w/2)+'" y="'+(w/2+4)+'" text-anchor="middle" font-size="'+(big?22:17)+'">'+emoji+'</text>'
    +'</svg>';
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}

/* ── 지도 초기화 ── */
kakao.maps.load(function(){
  map = new kakao.maps.Map(document.getElementById('kmap'),{
    center: new kakao.maps.LatLng(36.2, 127.9), level:13
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  /* 마커 생성 — zIndex: 위도 높을수록(북쪽) 위로 표시 */
  D.forEach(function(d,i){
    var color = d.t==='d' ? '#8B1C2A' : '#1a5f8b';
    var zIdx  = Math.round(d.lat * 1000); /* 위도 높을수록 zIndex 높아 위에 표시 */
    var mk = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(d.lat, d.lng),
      map: map,
      image: new kakao.maps.MarkerImage(
        mkSVG(color, d.ico, false),
        new kakao.maps.Size(42,52),
        {offset: new kakao.maps.Point(21,52)}
      ),
      title: d.n,
      zIndex: zIdx
    });
    (function(d,i,color){
      kakao.maps.event.addListener(mk,'click',function(){
        selectMarker(i, color);
        openSheet(i);
      });
    })(d,i,color);
    markers.push({mk:mk, color:color});
  });

  /* 지도 클릭 → 시트 닫기 */
  kakao.maps.event.addListener(map,'click', closeSheet);

  buildList();
});

/* ── 마커 강조 ── */
function selectMarker(idx, color){
  /* 이전 선택 원복 */
  if(selIdx>=0){
    var prev = markers[selIdx];
    prev.mk.setImage(new kakao.maps.MarkerImage(
      mkSVG(prev.color, D[selIdx].ico, false),
      new kakao.maps.Size(42,52),
      {offset: new kakao.maps.Point(21,52)}
    ));
    prev.mk.setZIndex(Math.round(D[selIdx].lat*1000));
  }
  /* 새 선택 — 크게 */
  selIdx = idx;
  markers[idx].mk.setImage(new kakao.maps.MarkerImage(
    mkSVG(color, D[idx].ico, true),
    new kakao.maps.Size(52,64),
    {offset: new kakao.maps.Point(26,64)}
  ));
  markers[idx].mk.setZIndex(9999);
}

/* ── 바텀시트 열기 ──
   완전히 지도 DOM 밖에 있어서 버튼 클릭 카카오 간섭 없음 */
function openSheet(i){
  var d=D[i];
  var bc = d.t==='d' ? 'd' : 'l';
  document.getElementById('shBadge').textContent = d.op;
  document.getElementById('shBadge').className   = 'sheet-badge '+bc;
  document.getElementById('shRegion').textContent= '📍 '+d.r;
  document.getElementById('shName').textContent  = d.ico+' '+d.n;

  var btn = document.getElementById('shBtn');
  btn.className = 'sheet-btn '+bc;
  /* ★ onclick으로 직접 location.href — 지도 밖이라 100% 동작 */
  btn.onclick = function(){ location.href = d.url; };

  document.getElementById('sheet').classList.add('open');
  map.panTo(new kakao.maps.LatLng(d.lat, d.lng));
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  /* 마커 강조 해제 */
  if(selIdx>=0){
    var prev=markers[selIdx];
    prev.mk.setImage(new kakao.maps.MarkerImage(
      mkSVG(prev.color, D[selIdx].ico, false),
      new kakao.maps.Size(42,52),
      {offset: new kakao.maps.Point(21,52)}
    ));
    prev.mk.setZIndex(Math.round(D[selIdx].lat*1000));
    selIdx=-1;
  }
}

/* ── 목록 빌드 ── */
function buildList(){
  var wrap=document.getElementById('viewList');
  wrap.innerHTML='';
  D.forEach(function(d,i){
    var bc=d.t==='d'?'d':'l';
    var card=document.createElement('div');
    card.className='card';

    /* 행1: 교구명+지역 */
    var r1=document.createElement('div'); r1.className='card-row1';
    var badge=document.createElement('span'); badge.className='card-badge '+bc; badge.textContent=d.op;
    var reg=document.createElement('span'); reg.className='card-region'; reg.textContent='📍 '+d.r;
    r1.appendChild(badge); r1.appendChild(reg);

    /* 행2: 아이콘+이름 */
    var r2=document.createElement('div'); r2.className='card-row2';
    var ico=document.createElement('div'); ico.className='card-ico'; ico.textContent=d.ico;
    var nm=document.createElement('div'); nm.className='card-name'; nm.textContent=d.n;
    r2.appendChild(ico); r2.appendChild(nm);

    /* 행3: 버튼 2개 */
    var r3=document.createElement('div'); r3.className='card-row3';

    var goBtn=document.createElement('button');
    goBtn.className='card-btn go '+bc;
    goBtn.textContent='🔗 홈페이지';
    /* ★ location.href 직접 — 목록은 일반 DOM이라 문제없음 */
    goBtn.addEventListener('click', (function(url){ return function(e){
      e.stopPropagation(); location.href=url;
    };})(d.url));

    var mapBtn=document.createElement('button');
    mapBtn.className='card-btn map';
    mapBtn.textContent='🗺 지도 보기';
    mapBtn.addEventListener('click', (function(d,i){ return function(e){
      e.stopPropagation();
      setView('map');
      setTimeout(function(){
        map.setLevel(8);
        map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
        var color=d.t==='d'?'#8B1C2A':'#1a5f8b';
        selectMarker(i,color);
        openSheet(i);
      },80);
    };})(d,i));

    r3.appendChild(goBtn); r3.appendChild(mapBtn);
    card.appendChild(r1); card.appendChild(r2); card.appendChild(r3);
    wrap.appendChild(card);
  });
}

/* ── 뷰 전환 ── */
function setView(v){
  var vm=document.getElementById('viewMap');
  var vl=document.getElementById('viewList');
  var tm=document.getElementById('tabMap');
  var tl=document.getElementById('tabList');
  if(v==='map'){
    vm.classList.remove('hidden'); vl.classList.add('hidden');
    tm.classList.add('on');        tl.classList.remove('on');
    if(map) setTimeout(function(){kakao.maps.event.trigger(map,'resize');},10);
  } else {
    vm.classList.add('hidden');    vl.classList.remove('hidden');
    tm.classList.remove('on');     tl.classList.add('on');
  }
}

/* ── 내 위치 ──
   1단계: 저정확도(빠름) → 즉시 이동
   2단계: 고정확도 → 도착하면 보정 */
function myLoc(){
  if(!navigator.geolocation){ alert('위치 서비스를 지원하지 않습니다.'); return; }

  function show(pos){
    var ll=new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    map.panTo(ll); map.setLevel(7);
    if(myLocOv) myLocOv.setMap(null);
    var dot=document.createElement('div'); dot.className='myloc';
    myLocOv=new kakao.maps.CustomOverlay({content:dot,position:ll,yAnchor:0.5,zIndex:100});
    myLocOv.setMap(map);
  }

  /* 1단계 — 저정확도로 빠르게 */
  navigator.geolocation.getCurrentPosition(show,
    function(err){ alert(err.code===1?'위치 권한을 허용해 주세요.':'위치를 가져올 수 없습니다.'); },
    {enableHighAccuracy:false, timeout:5000, maximumAge:60000}
  );
  /* 2단계 — 고정확도로 보정 */
  navigator.geolocation.getCurrentPosition(show,
    function(){}, /* 실패해도 무시 */
    {enableHighAccuracy:true, timeout:12000, maximumAge:0}
  );
}
</script>
</body>
</html>
