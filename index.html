
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보편교회 가톨릭</title>

<style>
body{margin:0;font-family:sans-serif;background:#1F2937;color:#111}
.view{display:none;height:100vh}
.active{display:flex}
#cover{flex-direction:column;justify-content:center;align-items:center;padding:16px;color:#fff}
.title{font-size:26px;font-weight:900;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px}
.btn{height:70px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;cursor:pointer}
#detail{flex-direction:column;background:#F8FAFC}
.header{height:60px;background:#1F2937;color:#fff;display:flex;align-items:center;padding:0 12px;font-size:18px;font-weight:900}
.back{margin-right:10px;cursor:pointer}
.content{flex:1;padding:16px;font-size:16px}
.install{position:fixed;left:12px;bottom:20px;background:#0F172A;color:#fff;padding:10px 12px;border-radius:10px;font-size:13px}
.qna{position:fixed;right:12px;bottom:20px;background:#0F172A;color:#fff;padding:10px 12px;border-radius:10px;font-size:13px}
</style>
</head>

<body>

<div id="cover" class="view active">
<div class="title">보편교회 가톨릭</div>

<div class="grid">
<div class="btn" onclick="openLink()">매일미사</div>
<div class="btn" onclick="go('주요기도문')">주요기도문</div>
<div class="btn" onclick="go('성지')">천주교 성지</div>
<div class="btn" onclick="go('성당')">내주변 성당</div>
<div class="btn" onclick="go('피정')">피정의 집</div>
<div class="btn" onclick="go('순례길')">전국 순례길</div>
<div class="btn" onclick="go('웹사이트')">웹사이트</div>
<div class="btn" onclick="go('관구교구')">관구교구</div>
</div>

<div class="install">앱설치</div>
<div class="qna" onclick="qna()">문의</div>
</div>

<div id="detail" class="view">
<div class="header"><span class="back" onclick="back()">←</span><span id="title"></span></div>
<div class="content">내용 영역</div>
</div>

<script>
let state="cover"

function show(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function go(name){
state="detail"
document.getElementById("title").innerText=name
show("detail")
}

function back(){
state="cover"
show("cover")
}

function openLink(){
window.open("https://maria.catholic.or.kr/mi_pr/missa/missa.asp","_blank")
}

function qna(){
window.open("https://docs.google.com","_blank")
}
</script>

</body>
</html>
